interface:
  display_name: "Codex Plugin-Style Checkpoint Cleanup"
  short_description: "Public cross-platform package for plugin-style automatic checkpoints with skill-style manual fallback"
default_prompt: "When this package is installed in plugin-style mode with .codex-plugin/plugin.json and hooks, automatically use $codex-cleaning-temporary-processes at fixed checkpoints after each finished high-risk tool step, after DevTools MCP or browser automation checkpoints, after a completed batch of one-shot helpers, after subagent completion, and at session end; when the package is only installed in skill-style mode under CODEX_HOME/skills, treat SKILL.md as manual fallback guidance instead of expecting automatic hooks; preserve the active Codex shell, require current-task lineage or current-thread-owned evidence for explicit automation, do not treat workspace match alone as enough for explicit automation, only record current-thread-owned explicit automation on a first follow-up pass that explicitly confirms real same-thread automation use with -ConfirmCurrentThreadExplicitAutomation and a non-blank workspace, keep generic runtimes workspace-scoped, and preserve multi-project isolation."
policy:
  allow_implicit_invocation: true
