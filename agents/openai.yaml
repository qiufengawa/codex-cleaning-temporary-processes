interface:
  display_name: "Codex Checkpoint Process Cleanup"
  short_description: "Cross-platform checkpoint-safe cleanup for stacked temporary dev processes"
default_prompt: "Automatically use $codex-cleaning-temporary-processes after each finished high-risk step whenever DevTools MCP, browser automation or remote debugging, build/test/dev/watch tooling, repeated shell or tool commands, or a subagent may have left temporary helpers behind; re-check before process stacks grow, run inspect when reuse is plausible, run checkpoint-cleanup when the step has clearly finished, do not kill automation that lacks current-task lineage or current-thread-owned evidence, do not treat workspace match alone as enough for explicit automation, only record current-thread-owned explicit automation on a first follow-up pass that explicitly confirms real same-thread automation use with -ConfirmCurrentThreadExplicitAutomation and a non-blank workspace, and do not treat Codex app-server ancestry alone as immediate cleanup permission."
policy:
  allow_implicit_invocation: true
