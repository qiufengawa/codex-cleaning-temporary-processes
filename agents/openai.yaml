interface:
  display_name: "Codex Checkpoint Process Cleanup"
  short_description: "Cross-platform checkpoint-safe cleanup for stacked temporary dev processes"
  default_prompt: "Automatically use $codex-cleaning-temporary-processes after each finished high-risk step whenever DevTools MCP, browser automation or remote debugging, build/test/dev/watch tooling, repeated shell or tool commands, or a subagent may have left temporary helpers behind; re-check before process stacks grow, run inspect when reuse is plausible, run checkpoint-cleanup when the step has clearly finished, and do not kill automation that lacks current-workspace or current-task ownership evidence."
policy:
  allow_implicit_invocation: true
