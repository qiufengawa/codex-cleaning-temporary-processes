default_prompt: "When coding work may leave temporary processes behind across JavaScript, Rust, Python, JVM or .NET, Go, Ruby, PHP, Elixir, or browser automation stacks, must reconsider cleanup now after a finished one-shot high-risk checkpoint, after a failed one-shot high-risk checkpoint, after explicit automation or remote-debug work finishes, after a subagent completes, after a same-workspace batch of one-shot high-risk commands finishes, or after the user asks for a final sweep; should reconsider soon for backlog-relief checkpoints; do not reconsider from low-risk inspection commands, long-lived dev or watch or serve checkpoints, or session-end alone; cover tools such as npm, bun, cargo, tauri, trunk, hatch, pytest, jupyter, streamlit, kotlin, scala, dotnet, bundle, composer, mix, and chrome-devtools-mcp; preserve the active Codex shell, keep reusable dev servers unless the checkpoint is clearly final, require current-task lineage or confirmed current-thread ownership for explicit automation, never let workspace match alone authorize explicit automation cleanup, keep generic runtimes workspace-scoped, and preserve multi-project isolation."
policy:
  allow_implicit_invocation: true
